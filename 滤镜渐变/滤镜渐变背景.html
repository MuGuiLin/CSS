<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>CSS滤镜渐变背景</title>
	<style>
		body {
			background: black;
		}

		h1 {
			margin: 20px auto;
			width: fit-content;
			text-align: center;
			font-size: 56px;
			color: transparent;
			background: linear-gradient(45deg, #bd34fe 30%, #41d1ff);
			background-clip: text;
		}

		.box {
			position: relative;
			margin: 200px auto;
			width: 500px;
			height: 500px;
			display: flex;
			justify-content: center;
			align-items: center;

			&::before {
				content: "";
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				width: 400px;
				height: 400px;
				border-radius: 50%;
				background-image: linear-gradient(-45deg, #bd34fe 50%, #47caff 50%);
				background-image: linear-gradient(-45deg, #ff00fe 50%, #03f5fe 50%);
				/* backdrop-filter: blur(88px); */
				filter: blur(88px);
			}
		}

		.box img {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
		}
	</style>
</head>

<body>
	<h1>CSS滤镜渐变背景</h1>
	<hr />
	<div class="box">
		<img src="./img/site.png" width="360px" />
	</div>
</body>

</html>
